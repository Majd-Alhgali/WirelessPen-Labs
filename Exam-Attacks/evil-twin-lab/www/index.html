<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taim Starlink LAB</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f5;
      color: #17202a;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid #cfd8df;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 10px 30px rgb(20 35 50 / 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      line-height: 1.8;
      font-size: 17px;
    }
    code {
      direction: ltr;
      unicode-bidi: bidi-override;
      background: #eef2f5;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>هذا Evil Twin تعليمي داخل اللاب</h1>
    <p>
      هذه الشبكة باسم <code>Taim Starlink LAB</code> مخصصة للتدريب فقط.
      الصفحة لا تطلب كلمة مرور، ولا تجمع اعتماديات، ولا توفر اتصال إنترنت.
    </p>
    <p>
      الهدف من الاختبار هو مراقبة association و DHCP وسلوك الأجهزة عند رؤية
      شبكة مشابهة داخل بيئة مملوكة ومصرح بها.
    </p>
  </main>
</body>
</html>
